name: Validate skills

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate skill registry and files
        run: python scripts/validate_skills.py

      - name: List all skills
        run: python scripts/list_skills.py

      - name: List review and audit skills
        run: python scripts/list_skills.py --category review-audit

      - name: Smoke test single-skill install plan
        run: python scripts/install_skill.py diagnose --dry-run

      - name: Smoke test category install plan
        run: python scripts/install_skill.py --category core-engineering --target /tmp/codex-skills-install --dry-run
