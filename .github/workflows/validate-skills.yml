name: Validate skills

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-skills:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate skill registry and files
        run: python scripts/validate_skills.py
